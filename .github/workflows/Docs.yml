name: Docs
on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:

permissions:
  contents: write
  statuses: write
  
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.10'
      - name: Install dependencies
        run: julia --project=docs -e 'using Pkg; Pkg.develop(path="."); Pkg.Registry.update(); Pkg.instantiate()'
      - name: Build and deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: julia --project=docs docs/make.jl